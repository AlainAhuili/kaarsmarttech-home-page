name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HTML
        run: |
          if [ -f "index.html" ]; then
            echo "Checking HTML syntax..."
            python3 -c "import html.parser, sys; content=open('index.html', 'r', encoding='utf-8').read(); parser=html.parser.HTMLParser(); parser.feed(content); print('HTML validation passed')"
          else
            echo "File index.html not found"
            exit 1
          fi
  deploy-pages:
    needs: validate-html
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          user_name: github-actions
          user_email: github-actions@github.com
          commit_message: "Deploy site from GitHub Actions"
