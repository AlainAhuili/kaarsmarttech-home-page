version: '3.9'

services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wpuserpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - db_data:/var/lib/mysql

  php:
    image: php:8.2-fpm
    restart: always
    depends_on:
      - db
    volumes:
      - ./public:/var/www/html
    working_dir: /var/www/html

  nginx:
    image: nginx:stable-alpine
    restart: always
    depends_on:
      - php
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html:ro

volumes:
  db_data:
